  <rect x="2" y="2" width="336" height="48" rx="24" fill="url(#bg)" stroke="url(#borderGrad)" stroke-width="2.5"/>
  <text x="26" y="32" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="url(#textGrad)">
