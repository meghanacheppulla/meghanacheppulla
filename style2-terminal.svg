<svg width="340" height="80" viewBox="0 0 340 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="termGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="termClip"><rect x="5" y="5" width="330" height="70" rx="10"/></clipPath>
  </defs>

  <rect x="5" y="5" width="330" height="70" rx="10" fill="url(#termGrad)" stroke="#22c55e" stroke-width="1.5" opacity="0.95">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <circle cx="20" cy="18" r="4" fill="#ef4444"/>
  <circle cx="34" cy="18" r="4" fill="#eab308"/>
  <circle cx="48" cy="18" r="4" fill="#22c55e"/>
  <line x1="5" y1="30" x2="335" y2="30" stroke="#1e293b" stroke-width="1"/>

  <g clip-path="url(#termClip)">
    <rect x="0" y="0" width="330" height="14" fill="url(#scanGrad)">
      <animate attributeName="y" values="30;70;30" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="20" y="52" font-family="'Courier New', monospace" font-size="15" font-weight="700" fill="#22c55e" filter="url(#termGlow)">
    $ open portfolio
  </text>
  <rect x="180" y="41" width="9" height="16" fill="#22c55e">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>
  <text x="20" y="68" font-family="'Courier New', monospace" font-size="10" fill="#64748b">
    → meghanacheppulla.github.io
  </text>
</svg>
